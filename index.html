<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok's Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .apps-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .app-badge {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #cbd5e1;
            transition: border-color 0.2s;
        }
        .app-badge:hover {
            border-color: #6366f1;
        }
        .play-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .play-link:hover { opacity: 0.9; }
        .footer {
            margin-top: 3rem;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>Ashok's Apps</h1>
        <p>Fun, lightweight Android apps crafted with care. From classic games to handy utilities — built for everyone.</p>

        <div class="apps-grid">
            <div class="app-badge">🪙 Coin Flip & Dice</div>
            <div class="app-badge">🧩 2048</div>
            <div class="app-badge">📝 Sudoku</div>
            <div class="app-badge">🎲 More coming soon</div>
        </div>

        <a class="play-link" href="https://play.google.com/store/apps/dev?id=7001677909210847797" target="_blank">
            View on Google Play →
        </a>

        <div class="footer">
            &copy; 2026 Ashok. All rights reserved.
        </div>
    </div>
</body>
</html>
